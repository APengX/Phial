<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Phial">
  <defs>
    <radialGradient id="p-bg" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#243665"/>
      <stop offset="55%" stop-color="#101a3a"/>
      <stop offset="100%" stop-color="#070c1c"/>
    </radialGradient>
    <radialGradient id="p-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffdf6" stop-opacity="0.95"/>
      <stop offset="32%" stop-color="#e2efff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#cfe3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="p-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2eaff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#84baea" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="p-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f6fc"/>
      <stop offset="100%" stop-color="#a7b5c9"/>
    </linearGradient>
    <filter id="p-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.7"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#p-bg)"/>

  <!-- starlight halo -->
  <circle cx="32" cy="37.5" r="23" fill="url(#p-glow)"/>

  <!-- the phial -->
  <path d="M27 17h10v6.6c5.2 2.6 8.6 7.7 8.6 14.6A13.6 13.6 0 0 1 18.4 38.2c0-6.9 3.4-12 8.6-14.6Z"
        fill="url(#p-glass)" stroke="#e8f4ff" stroke-width="1.7" stroke-linejoin="round"/>
  <path d="M25.8 17h12.4" stroke="#e8f4ff" stroke-width="1.7" stroke-linecap="round"/>
  <path d="M20.2 32.6a13 13 0 0 0 23.6 0" fill="none" stroke="#bfe0ff" stroke-width="1.1" stroke-opacity="0.6"/>
  <path d="M24 22.2c-3 3-4.6 7-4.6 11.6" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- stopper -->
  <rect x="24.5" y="8.6" width="15" height="9.4" rx="3" fill="url(#p-cap)"/>
  <rect x="24.5" y="8.6" width="15" height="3.6" rx="1.8" fill="#ffffff" fill-opacity="0.7"/>

  <!-- star of Eärendil within -->
  <g filter="url(#p-soft)">
    <path d="M32 24 L34.1 35.9 L46 38 L34.1 40.1 L32 52 L29.9 40.1 L18 38 L29.9 35.9 Z" fill="#ffffff"/>
  </g>
  <path d="M32 28 L33.6 36.4 L42 38 L33.6 39.6 L32 48 L30.4 39.6 L22 38 L30.4 36.4 Z" fill="#ffffff"/>
  <circle cx="32" cy="38" r="2.1" fill="#ffffff"/>

  <!-- a few escaping glints -->
  <path d="M13.6 38h3M50.4 38h-3M22 18l1.9 1.9M42 18l-1.9 1.9M32 53.5v3" stroke="#dff0ff" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.75"/>
</svg>
