<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>优先级看板</title>
  <style>
    :root {
      --bg: #f6f7f9; --panel: #fff; --line: #e4e6eb; --text: #1f2328; --dim: #6b7280;
      --now: #b91c1c; --next: #b45309; --later: #2563eb; --cut: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }
    header { max-width: 1100px; margin: 0 auto 18px; }
    h1 { font-size: 1.5rem; margin: 0 0 4px; }
    header p { margin: 0; color: var(--dim); font-size: 0.92rem; }
    .toolbar { max-width: 1100px; margin: 0 auto 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button {
      font: inherit; font-size: 0.86rem; cursor: pointer; border: 1px solid var(--line);
      background: var(--panel); color: var(--text); border-radius: 7px; padding: 7px 13px;
    }
    button:hover { background: #eef0f3; }
    button.primary { background: #6d28d9; border-color: #6d28d9; color: #fff; }
    button.primary:hover { background: #5b21b6; }
    .spacer { flex: 1; }
    .saved { font-size: 0.8rem; color: var(--dim); }
    .board { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 820px) { .board { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .board { grid-template-columns: 1fr; } }
    .col { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; min-height: 160px; display: flex; flex-direction: column; }
    .col-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .col[data-key="Now"] .dot { background: var(--now); }
    .col[data-key="Next"] .dot { background: var(--next); }
    .col[data-key="Later"] .dot { background: var(--later); }
    .col[data-key="Cut"] .dot { background: var(--cut); }
    .col-title { font-weight: 600; font-size: 0.92rem; }
    .col-count { margin-left: auto; font-size: 0.78rem; color: var(--dim); background: #f1f2f4; padding: 1px 8px; border-radius: 999px; }
    .cards { flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 40px; padding: 2px; border-radius: 8px; }
    .cards.drag-over { background: #f5f3ff; outline: 2px dashed #c4b5fd; outline-offset: -2px; }
    .card {
      background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px;
      font-size: 0.9rem; cursor: grab; box-shadow: 0 1px 2px rgba(0,0,0,0.04); position: relative;
    }
    .card:active { cursor: grabbing; }
    .card.dragging { opacity: 0.4; }
    .card .meta { display: flex; gap: 6px; align-items: center; margin-top: 5px; }
    .card .id { font-size: 0.72rem; color: var(--dim); font-family: ui-monospace, Menlo, monospace; }
    .card .del { position: absolute; top: 5px; right: 6px; border: 0; background: transparent; color: var(--dim); font-size: 0.95rem; line-height: 1; padding: 2px 5px; border-radius: 5px; opacity: 0; }
    .card:hover .del { opacity: 1; }
    .card .del:hover { background: #fee2e2; color: #b91c1c; }
    .card .ttl { outline: none; border-radius: 5px; padding: 1px 3px; margin: -1px -3px; word-break: break-word; }
    .card .ttl:focus { background: #faf5ff; box-shadow: 0 0 0 2px rgba(196,181,253,0.45); }
    .toolbar input { font: inherit; font-size: 0.86rem; border: 1px solid var(--line); border-radius: 7px; padding: 7px 11px; min-width: 190px; outline: none; }
    .toolbar input:focus { border-color: #c4b5fd; box-shadow: 0 0 0 3px rgba(196,181,253,0.25); }
    .empty-hint { color: #b9bdc6; font-size: 0.8rem; text-align: center; padding: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>优先级看板</h1>
    <p>把卡片拖到 <strong>Now / Next / Later / Cut</strong> 四列里、或在列内上下拖动调整顺序；卡片标题可直接点进去改。改完点「导出 Markdown 并回传给 AI」，结果会带着结构化数据发回对话里继续。</p>
  </header>

  <div class="toolbar">
    <input id="newTitle" placeholder="新卡片标题，回车或点「添加」" />
    <button id="add">＋ 添加</button>
    <button id="copy">复制 Markdown</button>
    <span class="spacer"></span>
    <span class="saved" id="saved"></span>
    <button class="primary" id="export">导出 Markdown 并回传给 AI →</button>
  </div>

  <div class="board" id="board"></div>

  <script>
    // Phial host bridge (falls back to no-ops if opened as a plain file).
    var phial = window.phial || { setState: function(){}, sendToAgent: function(){}, emit: function(){}, ready: function(){} };

    var COLS = [
      { key: 'Now', label: 'Now · 现在做' },
      { key: 'Next', label: 'Next · 接下来' },
      { key: 'Later', label: 'Later · 以后' },
      { key: 'Cut', label: 'Cut · 砍掉' }
    ];

    // Seed tickets — replace / extend at will (the AI can regenerate this list).
    var tickets = [
      { id: 'ENG-101', title: '修复登录页在 Safari 下的闪烁', col: 'Now' },
      { id: 'ENG-118', title: '把构建时间从 6min 压到 2min', col: 'Now' },
      { id: 'ENG-097', title: '搜索结果分页', col: 'Next' },
      { id: 'ENG-132', title: '导出为 CSV', col: 'Next' },
      { id: 'ENG-140', title: '深色模式', col: 'Later' },
      { id: 'ENG-076', title: '把日志接入 Sentry', col: 'Later' },
      { id: 'ENG-088', title: '重写已废弃的 onboarding 流程', col: 'Later' },
      { id: 'ENG-150', title: '给设置页加动画', col: 'Cut' },
      { id: 'ENG-061', title: '支持 IE11', col: 'Cut' }
    ];

    var board = document.getElementById('board');
    var savedEl = document.getElementById('saved');
    var seq = 200;

    function render() {
      board.innerHTML = '';
      COLS.forEach(function (c) {
        var col = document.createElement('section');
        col.className = 'col';
        col.dataset.key = c.key;

        var head = document.createElement('div');
        head.className = 'col-head';
        var items = tickets.filter(function (t) { return t.col === c.key; });
        head.innerHTML = '<span class="dot"></span><span class="col-title">' + escapeHtml(c.label) + '</span><span class="col-count">' + items.length + '</span>';
        col.appendChild(head);

        var cards = document.createElement('div');
        cards.className = 'cards';
        cards.dataset.key = c.key;
        items.forEach(function (t) { cards.appendChild(makeCard(t)); });
        if (!items.length) {
          var hint = document.createElement('div');
          hint.className = 'empty-hint';
          hint.textContent = '拖卡片到这里';
          cards.appendChild(hint);
        }
        wireDropZone(cards);
        col.appendChild(cards);
        board.appendChild(col);
      });
      pushState();
    }

    function makeCard(t) {
      var el = document.createElement('div');
      el.className = 'card';
      el.draggable = true;
      el.dataset.id = t.id;
      el.innerHTML =
        '<button class="del" title="删除">×</button>' +
        '<div class="ttl" contenteditable="true" spellcheck="false"></div>' +
        '<div class="meta"><span class="id">' + escapeHtml(t.id) + '</span></div>';
      var ttl = el.querySelector('.ttl');
      ttl.textContent = t.title;
      // editing the title in place — no window.prompt (it's blocked in the sandbox)
      ttl.addEventListener('blur', function () {
        var v = ttl.textContent.trim();
        if (v && v !== t.title) { t.title = v; pushState(); }
        else { ttl.textContent = t.title; }
      });
      ttl.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter') { ev.preventDefault(); ttl.blur(); }
      });
      // don't start a drag from inside the editable title
      ttl.addEventListener('mousedown', function (ev) { ev.stopPropagation(); el.draggable = false; });
      ttl.addEventListener('blur', function () { el.draggable = true; });
      el.querySelector('.del').addEventListener('click', function (ev) {
        ev.stopPropagation();
        tickets = tickets.filter(function (x) { return x.id !== t.id; });
        render();
      });
      el.addEventListener('dragstart', function (ev) {
        el.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', t.id);
      });
      el.addEventListener('dragend', function () {
        el.classList.remove('dragging');
        document.querySelectorAll('.cards.drag-over').forEach(function (n) { n.classList.remove('drag-over'); });
      });
      return el;
    }

    function wireDropZone(zone) {
      zone.addEventListener('dragover', function (ev) {
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
        zone.classList.add('drag-over');
        var dragging = document.querySelector('.card.dragging');
        if (!dragging) return;
        var after = cardAfter(zone, ev.clientY);
        var hint = zone.querySelector('.empty-hint');
        if (hint) hint.remove();
        if (after == null) zone.appendChild(dragging);
        else zone.insertBefore(dragging, after);
      });
      zone.addEventListener('dragleave', function (ev) {
        if (ev.target === zone) zone.classList.remove('drag-over');
      });
      zone.addEventListener('drop', function (ev) {
        ev.preventDefault();
        zone.classList.remove('drag-over');
        commitFromDom();
      });
    }

    function cardAfter(zone, y) {
      var cards = Array.prototype.slice.call(zone.querySelectorAll('.card:not(.dragging)'));
      var closest = null, closestOffset = -Infinity;
      cards.forEach(function (c) {
        var box = c.getBoundingClientRect();
        var offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closestOffset) { closestOffset = offset; closest = c; }
      });
      return closest;
    }

    // Re-derive `tickets` order/column from the current DOM after a drop.
    function commitFromDom() {
      var next = [];
      document.querySelectorAll('.cards').forEach(function (zone) {
        var key = zone.dataset.key;
        zone.querySelectorAll('.card').forEach(function (cardEl) {
          var found = tickets.filter(function (t) { return t.id === cardEl.dataset.id; })[0];
          if (found) { found.col = key; next.push(found); }
        });
      });
      tickets = next;
      render();
    }

    function columnsObject() {
      var out = {};
      COLS.forEach(function (c) {
        out[c.key] = tickets.filter(function (t) { return t.col === c.key; }).map(function (t) { return { id: t.id, title: t.title }; });
      });
      return out;
    }

    function toMarkdown() {
      var lines = ['# 优先级排序', ''];
      COLS.forEach(function (c) {
        lines.push('## ' + c.label);
        var items = tickets.filter(function (t) { return t.col === c.key; });
        if (!items.length) lines.push('_（空）_');
        else items.forEach(function (t) { lines.push('- [ ] `' + t.id + '` ' + t.title); });
        lines.push('');
      });
      return lines.join('\n').trim() + '\n';
    }

    function pushState() {
      phial.setState({ columns: columnsObject(), markdown: toMarkdown() });
      savedEl.textContent = '已同步到 Phial · ' + new Date().toLocaleTimeString();
    }

    var newTitleEl = document.getElementById('newTitle');
    function addCard() {
      var title = (newTitleEl.value || '').trim();
      if (!title) { newTitleEl.focus(); return; }
      seq += 1;
      tickets.push({ id: 'NEW-' + seq, title: title, col: 'Next' });
      newTitleEl.value = '';
      render();
      newTitleEl.focus();
    }
    document.getElementById('add').addEventListener('click', addCard);
    newTitleEl.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter') { ev.preventDefault(); addCard(); }
    });

    document.getElementById('copy').addEventListener('click', function () {
      var md = toMarkdown();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(md).then(function () { savedEl.textContent = '已复制 Markdown'; });
      } else {
        savedEl.textContent = '当前环境不支持剪贴板';
      }
    });

    document.getElementById('export').addEventListener('click', function () {
      phial.sendToAgent(
        '我在看板里重新排好了优先级，导出的 Markdown 见附带数据。',
        { markdown: toMarkdown(), columns: columnsObject() }
      );
    });

    render();
    phial.ready();
  </script>
</body>
</html>
